spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: ${SHOW_SQL:false}
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

# https://docs.camunda.io/docs/apis-tools/camunda-spring-boot-starter/getting-started/
# https://docs.camunda.io/docs/apis-tools/camunda-spring-boot-starter/configuration/

camunda:
  client:
    mode: saas
    auth:
      client-id: ${CAMUNDA_CLIENT_ID}
      client-secret: ${CAMUNDA_CLIENT_SECRET}
    cluster-id: ${CAMUNDA_CLUSTER_ID}
    region: ${CAMUNDA_REGION}

server:
  port: ${SERVER_PORT:8082}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"

efms:
  app:
    jwtSecret: ${JWT_SECRET}
    jwtExpirationMs: ${JWT_EXPIRATION_MS:86400000}
  camunda:
    tasklist-url: ${CAMUNDA_TASKLIST_URL}
    zeebe-rest-url: ${CAMUNDA_ZEEBE_REST_URL}
    approval-threshold: ${CAMUNDA_APPROVAL_THRESHOLD:100000000}