version: '3.8'

services:
  core-service:
    build: .
    container_name: efms-core-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - DB_URL=${DB_URL:-jdbc:postgresql://core-db:5432/efms_core_db}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-yourpassword}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:-86400000}
    depends_on:
      - core-db

  core-db:
    image: postgres:16-alpine
    container_name: efms-core-db
    environment:
      - POSTGRES_DB=efms_core_db
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-yourpassword}
    ports:
      - "5434:5432" # Use 5434 to avoid conflict with identity-db (5433)
    volumes:
      - core-db-data:/var/lib/postgresql/data

volumes:
  core-db-data:
